# ============================================================
# Konfigurasi Nginx — Optimasi untuk Laravel di Railway
# Port diinjeksi secara dinamis oleh entrypoint.sh
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 64M;

    # Gzip Compression
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        application/javascript
        application/json
        application/xml
        text/css
        text/plain
        text/xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml;

    server {
        # Railway akan meng-inject PORT via environment variable
        listen ${PORT};
        server_name _;

        root /var/www/html/public;
        index index.php index.html;

        # Aset statis — cache agresif
        location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
            expires 30d;
            access_log off;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Routing utama Laravel
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # PHP-FPM Handler
        location ~ \.php$ {
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;

            # Timeout untuk operasi berat
            fastcgi_connect_timeout 60s;
            fastcgi_send_timeout 600s;
            fastcgi_read_timeout 600s;

            # Buffer untuk response besar
            fastcgi_buffering on;
            fastcgi_buffer_size 16k;
            fastcgi_buffers 16 16k;
        }

        # Blokir akses ke file tersembunyi (.env, .git, dll)
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
